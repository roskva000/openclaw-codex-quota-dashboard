<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codex Quota Dashboard</title>
  <style>
    :root{--bg:#0b1020;--card:#121a31;--text:#e7ecff;--muted:#9fb0e0;--ok:#2ecc71;--warn:#f1c40f;--bad:#e74c3c;}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#0b1020,#0f1730);color:var(--text);font-family:Inter,system-ui,Arial,sans-serif}
    .wrap{max-width:1100px;margin:28px auto;padding:0 16px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
    h1{font-size:22px;margin:0} .meta{color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
    .card{background:var(--card);border:1px solid #24345f;border-radius:14px;padding:14px}
    .profile{font-weight:700;margin-bottom:8px}
    .row{margin:8px 0;padding:10px;background:#0d1428;border-radius:10px;border:1px solid #1f2d54}
    .label{font-size:12px;color:var(--muted)}
    .bar{height:8px;background:#263452;border-radius:999px;overflow:hidden;margin:8px 0}
    .fill{height:100%;background:linear-gradient(90deg,var(--ok),#57d68d)}
    .nums{font-size:13px;color:#cdd8ff;display:flex;justify-content:space-between}
    .countdown{font-size:12px;color:#8ea3dc;margin-top:4px}
    .status{font-size:12px;color:var(--muted)}
    button:disabled{opacity:.6;cursor:not-allowed}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Codex Quota Dashboard</h1>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <button id="refreshBtn" style="background:#2d6cdf;color:white;border:none;border-radius:10px;padding:8px 12px;cursor:pointer;font-weight:600;">🔄 Refresh</button>
        <div class="meta" id="meta">Yükleniyor…</div>
      </div>
    </div>
    <div class="status" id="status"></div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    const fmt = (ms) => new Date(ms).toLocaleString('tr-TR', {hour12:false});
    const left = (ms) => {
      const s = Math.max(0, Math.floor((ms - Date.now())/1000));
      const d = Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60);
      return d>0 ? `${d}g ${h}s ${m}d` : `${h}s ${m}d`;
    };

    function rowHtml(w){
      const remain = w.remainingPercent ?? (100-(w.usedPercent||0));
      const color = remain > 50 ? '#2ecc71' : remain > 20 ? '#f1c40f' : '#e74c3c';
      return `<div class="row">
        <div class="label">${w.label}</div>
        <div class="bar"><div class="fill" style="width:${Math.max(0,Math.min(100,remain))}%;background:${color}"></div></div>
        <div class="nums"><span>Kalan: %${remain}</span><span>Kullanım: %${w.usedPercent}</span></div>
        <div class="countdown">Reset: ${fmt(w.resetAt)} · ${left(w.resetAt)} kaldı</div>
      </div>`;
    }

    async function load(){
      const res = await fetch('/data/latest.json?ts=' + Date.now());
      if(!res.ok) throw new Error('JSON okunamadı');
      const data = await res.json();
      const grid = document.getElementById('grid');
      const meta = document.getElementById('meta');
      const status = document.getElementById('status');

      const lastUpdate = data.collectedAt || data.generatedAt;
      meta.textContent = `Provider: ${data.provider} · Agent: ${data.agent} · Son güncelleme: ${new Date(lastUpdate).toLocaleString('tr-TR',{hour12:false})}`;
      status.textContent = `Order: ${(data.originalOrder||[]).join(' -> ')}`;

      grid.innerHTML = (data.profiles||[]).map(p => `
        <div class="card">
          <div class="profile">${p.profile}</div>
          ${(p.windows||[]).map(rowHtml).join('') || '<div class="label">Usage yok</div>'}
        </div>`).join('');
    }

    let statusPollTimer = null;

    function setRefreshUiRunning(running){
      const btn = document.getElementById('refreshBtn');
      if(running){
        btn.disabled = true;
        btn.textContent = '⏳ Yenileniyor...';
      }else{
        btn.disabled = false;
        btn.textContent = '🔄 Refresh';
      }
    }

    async function pollRefreshStatus(){
      const status = document.getElementById('status');
      try{
        const res = await fetch('/api/refresh-status?ts=' + Date.now());
        const data = await res.json();
        if(!res.ok || !data.ok) throw new Error('status okunamadı');

        if(data.running){
          setRefreshUiRunning(true);
          status.textContent = 'Collector çalışıyor... (sayfayı yenilesen de devam eder)';
          return true;
        }

        setRefreshUiRunning(false);

        if(data.lastExitCode === 0){
          await load();
          status.textContent = 'Güncellendi ✅';
        }else if(typeof data.lastExitCode === 'number' && data.lastExitCode !== 0){
          status.textContent = 'Hata: collector başarısız oldu';
        }
        return false;
      }catch(e){
        status.textContent = 'Hata: ' + e.message;
        setRefreshUiRunning(false);
        return false;
      }
    }

    async function refreshNow(){
      const status = document.getElementById('status');
      setRefreshUiRunning(true);
      status.textContent = 'Collector başlatılıyor...';
      try{
        const res = await fetch('/api/refresh', { method:'POST' });
        const data = await res.json();
        if(!res.ok || !data.ok) throw new Error(data.error || 'Refresh başarısız');

        if(statusPollTimer) clearInterval(statusPollTimer);
        statusPollTimer = setInterval(async () => {
          const running = await pollRefreshStatus();
          if(!running){
            clearInterval(statusPollTimer);
            statusPollTimer = null;
          }
        }, 2000);

        await pollRefreshStatus();
      }catch(e){
        status.textContent = 'Hata: ' + e.message;
        setRefreshUiRunning(false);
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', refreshNow);
    load().then(() => pollRefreshStatus()).catch(e => { document.getElementById('status').textContent = 'Hata: ' + e.message; });
  </script>
</body>
</html>
